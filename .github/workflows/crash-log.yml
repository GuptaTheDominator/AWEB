name: Capture Crash Log on Emulator

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crash-log:
    name: Build + Run on Emulator + Capture Logcat
    # macOS-13 = Intel x86_64, supports x86_64 Android emulator with hardware acceleration
    runs-on: macos-13
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build DEBUG APK (no signing, no ABI split for emulator)
        run: |
          # Override splits to produce a universal debug APK that works on x86_64 emulator
          ./gradlew assembleDebug \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            2>&1 | tail -30

          # Find the APK wherever it is
          APK=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -1)
          echo "APK found: $APK ($(du -sh $APK | cut -f1))"
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Run on emulator + capture logcat
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_3a
          target: google_apis
          emulator-options: -no-snapshot -no-audio -no-boot-anim -memory 4096 -no-window
          disable-animations: true
          script: |
            set -e

            echo "========================================"
            echo "Emulator ready — installing AWEB"
            echo "========================================"
            adb devices

            # Install the APK
            APK_PATH="${{ env.APK_PATH }}"
            if [ -z "$APK_PATH" ]; then
              APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -1)
            fi
            echo "Installing: $APK_PATH"
            adb install -r "$APK_PATH"

            # Clear logcat
            adb logcat -c
            sleep 2

            # Launch AWEB
            echo "Launching com.aweb.browser.debug..."
            adb shell am start -n "com.aweb.browser.debug/com.aweb.browser.ui.MainActivity"
            echo "App launched — waiting 30 seconds for crash..."
            sleep 30

            # Check running status
            RUNNING=$(adb shell "ps -A 2>/dev/null | grep com.aweb.browser.debug" || echo "")
            echo ""
            if [ -n "$RUNNING" ]; then
              echo "✅ App IS STILL RUNNING after 30s — probably NOT crashing"
              echo "$RUNNING"
            else
              echo "❌ App is NOT running — it CRASHED or never launched"
            fi

            # Capture logcat
            adb logcat -d > aweb_crash_logcat.txt
            LINES=$(wc -l < aweb_crash_logcat.txt)
            echo "Logcat: $LINES lines"

            echo ""
            echo "========================================"
            echo " CRASH ANALYSIS"
            echo "========================================"

            echo ""
            echo "=== [1] FATAL EXCEPTIONS ==="
            grep -A 40 "FATAL EXCEPTION" aweb_crash_logcat.txt | head -120 || echo "(none)"

            echo ""
            echo "=== [2] AWEB_CRASH logger ==="
            grep "AWEB_CRASH" aweb_crash_logcat.txt || echo "(none)"

            echo ""
            echo "=== [3] AndroidRuntime errors ==="
            grep "AndroidRuntime" aweb_crash_logcat.txt | head -30 || echo "(none)"

            echo ""
            echo "=== [4] com.aweb ERRORS ==="
            grep -E "E/.*com\.aweb|E/AwebApp|E/TabView|E/GeckoRun|E/GeckoSes|E/MainActivity|E/WorkspaceVM" \
              aweb_crash_logcat.txt | head -60 || echo "(none)"

            echo ""
            echo "=== [5] All Exceptions + stack ==="
            grep -E "Exception|Error:|Caused by:|^\s+at com\.aweb|^\s+at org\.mozilla" \
              aweb_crash_logcat.txt | head -80 || echo "(none)"

            echo ""
            echo "=== [6] GeckoView output ==="
            grep -iE "GeckoRun|GeckoSess|geckoview|Gecko" \
              aweb_crash_logcat.txt | grep -v "install\|download\|unzip" | head -40 || echo "(none)"

            echo ""
            echo "=== [7] Hilt/Dagger errors ==="
            grep -iE "hilt|dagger|inject|EntryPoint" \
              aweb_crash_logcat.txt | grep -iE "error|fail|crash|exception" | head -20 || echo "(none)"

            echo ""
            echo "=== [8] Room/SQLite errors ==="
            grep -iE "room|sqlite|database" \
              aweb_crash_logcat.txt | grep -iE "error|fail|exception" | head -20 || echo "(none)"

            echo ""
            echo "=== [9] ActivityManager / ANR ==="
            grep -E "ActivityManager|am_crash|ANR|Force finishing" \
              aweb_crash_logcat.txt | head -20 || echo "(none)"

            echo ""
            echo "=== [10] Last 100 AWEB log lines ==="
            grep -E "com\.aweb|GeckoRun|GeckoSes|AwebApp|TabView|WorkspaceVM|HardeningVM" \
              aweb_crash_logcat.txt | tail -100 || echo "(none)"

            echo ""
            echo "========================================"
            echo " END OF CRASH ANALYSIS"
            echo "========================================"

      - name: Upload full logcat
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aweb-crash-logcat
          path: aweb_crash_logcat.txt
          retention-days: 7
