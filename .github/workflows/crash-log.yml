name: Capture Crash Log on Emulator

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crash-log:
    name: Build + Run on Emulator + Capture Logcat
    # macos-latest has hardware acceleration (Hypervisor.framework) — emulator boots in ~60s
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build DEBUG APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
          echo "APK_PATH=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_ENV

      # reactivecircus/android-emulator-runner handles AVD + boot + teardown
      # API 26 boots fastest; x86_64 with macOS hypervisor = ~60s boot time
      - name: Run emulator + capture crash log
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_3a
          target: google_apis
          emulator-options: -no-snapshot -no-audio -no-boot-anim -memory 3072
          disable-animations: true
          script: |
            set -e

            echo "========================================"
            echo "Emulator booted — installing AWEB APK"
            echo "========================================"

            adb install -r app/build/outputs/apk/debug/app-debug.apk
            echo "APK installed"

            # Clear logcat buffer before starting
            adb logcat -c

            # Launch the app
            adb shell am start -n "com.aweb.browser.debug/com.aweb.browser.ui.MainActivity"
            echo "App launched — waiting 25 seconds..."
            sleep 25

            # Check if still running
            RUNNING=$(adb shell "ps -A 2>/dev/null | grep com.aweb.browser.debug" || echo "")
            if [ -n "$RUNNING" ]; then
              echo "✅ App is STILL RUNNING after 25 seconds"
            else
              echo "❌ App CRASHED or closed"
            fi

            # Capture full logcat
            adb logcat -d > /tmp/aweb_logcat.txt
            echo "Logcat: $(wc -l < /tmp/aweb_logcat.txt) lines captured"

            echo ""
            echo "========================================"
            echo " CRASH ANALYSIS"
            echo "========================================"

            echo ""
            echo "--- FATAL EXCEPTIONS ---"
            grep -A 30 "FATAL EXCEPTION" /tmp/aweb_logcat.txt | head -100 || echo "(none)"

            echo ""
            echo "--- AWEB_CRASH (our logger) ---"
            grep "AWEB_CRASH" /tmp/aweb_logcat.txt || echo "(none)"

            echo ""
            echo "--- com.aweb ERRORS & WARNINGS ---"
            grep -E "[EW]/.*(com\.aweb|AwebApp|TabView|WorkspaceView|GeckoRun|GeckoSes|MainActivity)" \
              /tmp/aweb_logcat.txt | grep -v "^\-\-$" | head -80 || echo "(none)"

            echo ""
            echo "--- All Exceptions & Stack Traces ---"
            grep -E "Exception|Error:|Caused by:|^\s+at (com\.aweb|org\.mozilla)" \
              /tmp/aweb_logcat.txt | head -100 || echo "(none)"

            echo ""
            echo "--- GeckoView messages ---"
            grep -iE "GeckoRun|GeckoSess|geckoview" \
              /tmp/aweb_logcat.txt | grep -iv "Install\|download\|unzip" | head -40 || echo "(none)"

            echo ""
            echo "--- Hilt/Dagger Errors ---"
            grep -iE "hilt|dagger|inject" /tmp/aweb_logcat.txt | grep -i "error\|fail\|crash" | head -20 || echo "(none)"

            echo ""
            echo "--- Room/SQLite Errors ---"
            grep -iE "room\|sqlite\|database\|SQLite" /tmp/aweb_logcat.txt | grep -i "error\|fail\|except" | head -20 || echo "(none)"

            echo ""
            echo "--- ActivityManager (app lifecycle) ---"
            grep -E "ActivityManager.*com\.aweb|am_crash|ANR" /tmp/aweb_logcat.txt | head -20 || echo "(none)"

            echo ""
            echo "--- Last 80 AWEB log lines (before crash) ---"
            grep "com\.aweb\|GeckoRun\|GeckoSes\|AwebApp\|TabViewModel\|WorkspaceVM" \
              /tmp/aweb_logcat.txt | tail -80 || echo "(none)"

            echo ""
            echo "========================================"
            echo " END OF CRASH ANALYSIS"
            echo "========================================"

            # Copy to workspace for artifact upload
            cp /tmp/aweb_logcat.txt ./aweb_crash_logcat.txt

      - name: Upload full logcat
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aweb-crash-logcat
          path: aweb_crash_logcat.txt
          retention-days: 7
