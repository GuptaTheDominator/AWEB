name: Capture Crash Log on Emulator

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crash-log:
    name: Run APK on Emulator + Capture Logcat
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install emulator + system image
        run: |
          sdkmanager --install \
            "emulator" \
            "system-images;android-29;google_apis;x86_64" \
            "platforms;android-29" \
            "platform-tools" 2>&1 | tail -5
          echo "SDK packages installed"

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            --name "aweb_test" \
            --package "system-images;android-29;google_apis;x86_64" \
            --device "pixel_3a" \
            --force
          echo "AVD created"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo apt-get install -y libvirt-daemon-system 2>/dev/null || true
          sudo adduser $USER kvm || true
          echo "KVM ready"

      - name: Start emulator (background)
        run: |
          $ANDROID_HOME/emulator/emulator \
            -avd aweb_test \
            -no-snapshot \
            -no-audio \
            -no-window \
            -gpu swiftshader_indirect \
            -no-boot-anim \
            -memory 3072 \
            -cores 2 \
            2>&1 &
          echo "Emulator started (PID $!)"

      - name: Wait for emulator to boot
        run: |
          adb wait-for-device
          for i in $(seq 1 60); do
            BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            echo "Boot check $i: '$BOOT'"
            if [ "$BOOT" = "1" ]; then
              echo "Emulator booted!"
              break
            fi
            sleep 5
          done
          adb shell input keyevent 82   # unlock screen
          sleep 3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build DEBUG APK (fastest, no signing)
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC" \
            2>&1 | tail -20
          ls -lh app/build/outputs/apk/debug/

      - name: Clear logcat buffer
        run: adb logcat -c

      - name: Install APK on emulator
        run: |
          adb install -r app/build/outputs/apk/debug/app-debug.apk
          echo "APK installed"

      - name: Start AWEB + capture logcat for 30 seconds
        run: |
          # Start the app
          adb shell am start -n "com.aweb.browser.debug/com.aweb.browser.ui.MainActivity"
          echo "App started — capturing logcat for 30 seconds..."
          sleep 30

          # Capture ALL logcat output
          adb logcat -d > /tmp/full_logcat.txt
          echo "Logcat captured: $(wc -l < /tmp/full_logcat.txt) lines"

      - name: Extract crash log
        run: |
          echo "============================================================"
          echo "  AWEB CRASH LOG — Filtered for relevant output"
          echo "============================================================"
          echo ""

          echo "=== FATAL / CRASH ==="
          grep -E "FATAL|AndroidRuntime|FATAL EXCEPTION|Process:.*com.aweb" \
            /tmp/full_logcat.txt | head -60 || echo "(none)"

          echo ""
          echo "=== AWEB_CRASH tag (our logger) ==="
          grep "AWEB_CRASH" /tmp/full_logcat.txt | head -40 || echo "(none)"

          echo ""
          echo "=== com.aweb.browser ERRORS ==="
          grep -E "E.*com.aweb.browser|E.*AwebApplication|E.*TabViewModel|E.*WorkspaceViewModel|E.*GeckoSession|E.*GeckoRuntime|E.*MainActivity" \
            /tmp/full_logcat.txt | head -60 || echo "(none)"

          echo ""
          echo "=== Java/Kotlin Exceptions ==="
          grep -E "Exception|Error:|at com.aweb|at org.mozilla.geckoview|Caused by:" \
            /tmp/full_logcat.txt | grep -v "^--$" | head -80 || echo "(none)"

          echo ""
          echo "=== GeckoView messages ==="
          grep -E "GeckoRuntime|GeckoSession|geckoview|Gecko" \
            /tmp/full_logcat.txt | grep -iv "unzip\|download\|install" | head -40 || echo "(none)"

          echo ""
          echo "=== Hilt / DI errors ==="
          grep -iE "hilt|dagger|inject|component" \
            /tmp/full_logcat.txt | grep -i "error\|fail\|except" | head -20 || echo "(none)"

          echo ""
          echo "=== Room / Database errors ==="
          grep -iE "room|sqlite|database" \
            /tmp/full_logcat.txt | grep -i "error\|fail\|except" | head -20 || echo "(none)"

          echo ""
          echo "=== Last 50 lines before crash ==="
          grep -n "com.aweb\|AndroidRuntime\|FATAL\|GeckoRun\|GeckoSes\|TabViewModel\|WorkspaceVM\|AwebApp" \
            /tmp/full_logcat.txt | tail -50 || echo "(none)"

          echo ""
          echo "============================================================"

          # Also save full log as artifact
          cp /tmp/full_logcat.txt /tmp/aweb_full_logcat.txt

      - name: Check if app is still running
        run: |
          RUNNING=$(adb shell "ps -A | grep com.aweb" 2>/dev/null || echo "")
          if [ -n "$RUNNING" ]; then
            echo "✅ App is STILL RUNNING after 30 seconds"
            echo "$RUNNING"
          else
            echo "❌ App is NOT running after 30 seconds — it crashed"
          fi

      - name: Capture ANR logs if any
        run: |
          adb shell ls /data/anr/ 2>/dev/null && \
          adb shell cat /data/anr/anr_00 2>/dev/null | head -100 || \
          echo "(no ANR files)"

      - name: Upload full logcat as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aweb-crash-logcat
          path: /tmp/aweb_full_logcat.txt
          retention-days: 7
