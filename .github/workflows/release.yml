name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create Keystore
        run: |
          echo "Generate dummy keystore"
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias release -password password -keypass password -dname "CN=AWEB, OU=Arena, O=Arena, L=SF, S=CA, C=US"
          echo "storeFile=../release.jks" > keystore.properties
          echo "storePassword=password" >> keystore.properties
          echo "keyAlias=release" >> keystore.properties
          echo "keyPassword=password" >> keystore.properties

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Get Tag Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: AWEB ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-arm64-v8a-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
