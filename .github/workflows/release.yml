name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Signed ARM64 release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match app versionName $VERSION" >&2
            exit 1
          fi

      - name: Restore release keystore
        env:
          AWEB_KEYSTORE_BASE64: ${{ secrets.AWEB_KEYSTORE_BASE64 }}
          AWEB_KEYSTORE_PASSWORD: ${{ secrets.AWEB_KEYSTORE_PASSWORD }}
          AWEB_KEY_ALIAS: ${{ secrets.AWEB_KEY_ALIAS }}
          AWEB_KEY_PASSWORD: ${{ secrets.AWEB_KEY_PASSWORD }}
        run: |
          test -n "$AWEB_KEYSTORE_BASE64"
          test -n "$AWEB_KEYSTORE_PASSWORD"
          test -n "$AWEB_KEY_ALIAS"
          test -n "$AWEB_KEY_PASSWORD"
          echo "$AWEB_KEYSTORE_BASE64" | base64 --decode > release.jks
          chmod 600 release.jks
          printf '%s\n' \
            "storeFile=../release.jks" \
            "storePassword=$AWEB_KEYSTORE_PASSWORD" \
            "keyAlias=$AWEB_KEY_ALIAS" \
            "keyPassword=$AWEB_KEY_PASSWORD" > keystore.properties
          chmod 600 keystore.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest --stacktrace --no-daemon

      - name: Run Android lint
        run: ./gradlew lintRelease --stacktrace --no-daemon

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Verify APK signature and alignment
        run: |
          APK=$(ls app/build/outputs/apk/release/*arm64-v8a-release.apk | head -n 1)
          BUILD_TOOLS=$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)
          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$APK"
          "$BUILD_TOOLS/zipalign" -c -p 4 "$APK"

      - name: Prepare release artifacts
        run: |
          cd app/build/outputs/apk/release
          APK=$(ls *arm64-v8a-release.apk | head -n 1)
          OUT="AWEB-${GITHUB_REF_NAME}-arm64.apk"
          cp "$APK" "$OUT"
          sha256sum "$OUT" > "$OUT.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AWEB-${{ github.ref_name }}-release-artifacts
          path: |
            app/build/outputs/apk/release/AWEB-${{ github.ref_name }}-arm64.apk
            app/build/outputs/apk/release/AWEB-${{ github.ref_name }}-arm64.apk.sha256
            app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AWEB ${{ github.ref_name }} ARM64
          files: |
            app/build/outputs/apk/release/AWEB-${{ github.ref_name }}-arm64.apk
            app/build/outputs/apk/release/AWEB-${{ github.ref_name }}-arm64.apk.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
