name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Unit tests, lint, debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest --stacktrace --no-daemon

      - name: Run Android lint
        run: ./gradlew lintRelease --stacktrace --no-daemon

      - name: Build debug ARM64 APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AWEB-debug-arm64
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
